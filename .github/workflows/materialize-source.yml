name: Materialize source

on:
  push:
    paths:
      - ".github/workflows/materialize-source.yml"

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore source files
        shell: bash
        run: |
          node <<'NODE'
          const crypto = require('node:crypto');
          const fs = require('node:fs');
          const zlib = require('node:zlib');

          const appBase64 = ['01', '02', '03', '04']
            .map((part) => fs.readFileSync(`.codex-transfer/app.js.br.b64.${part}`, 'utf8').trim())
            .join('');
          const files = {
            'index.html': zlib.brotliDecompressSync(Buffer.from(fs.readFileSync('.codex-transfer/index.html.br.b64', 'utf8').trim(), 'base64')),
            'styles.css': zlib.brotliDecompressSync(Buffer.from(fs.readFileSync('.codex-transfer/styles.css.br.b64', 'utf8').trim(), 'base64')),
            'app.js': zlib.brotliDecompressSync(Buffer.from(appBase64, 'base64')),
          };
          const expected = {
            'index.html': '63a856e8ee7043a4e17f0ce0fb7bb05b0b4a211728445fc4b87073f1558e415f',
            'styles.css': 'e758bc6779596d17c7ffef1dea82335548c966f431703b04fd79a5a44e19089d',
            'app.js': 'da273623eecae599e1b714f10902049037a5409c745fb14f46e83bce0cf1bda4',
          };

          for (const [path, contents] of Object.entries(files)) {
            const digest = crypto.createHash('sha256').update(contents).digest('hex');
            if (digest !== expected[path]) throw new Error(`${path} checksum mismatch: ${digest}`);
            fs.writeFileSync(path, contents);
          }
          NODE

      - name: Commit restored source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html styles.css app.js
          git commit -m "Upgrade recommendations and matchups"
          git push
